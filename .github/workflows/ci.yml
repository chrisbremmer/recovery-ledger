name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# MR-28: lock down the default GITHUB_TOKEN to read-only. CI runs npm
# install, lint, build, test, and grep gates — none require write access
# to the repo. Pinning the contents scope reduces supply-chain blast
# radius if a future third-party action is added without permissions
# scoping of its own.
permissions:
  contents: read

# Avoid queueing redundant runs on push spam. Cancel in-flight runs on the same
# ref when a new commit arrives; the latest commit is the one we care about.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Phase 2 Plan 08 / D-25: matrix expanded from a single macOS row to
    # macos-latest + ubuntu-latest. The Linux row exercises the file-fallback
    # path (no libsecret keychain available) by setting
    # RECOVERY_LEDGER_FORCE_FILE_STORE=1 on the Test step — the same env
    # override the token-store reads at module load. macOS continues to
    # exercise the keyring backend by default. Windows remains permanently
    # out of scope.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      # MR-28: pinned to a commit SHA, with the tag in a trailing comment for
      # human readability. Floating major tags (`@v4`) can be retagged to
      # point at a different commit — a supply-chain attacker who compromises
      # the actions/* repo could swap the implementation under a stable tag.
      # Dependabot's github-actions ecosystem can lift these to newer SHAs
      # while preserving the audit trail.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck the whole project (src + tests) with the TypeScript
      # compiler. Neither Build (tsup/esbuild) nor Test (vitest) run the
      # type checker — both strip types without checking them — so type
      # errors can otherwise land on main unseen. Runs before Build to fail
      # fast on type regressions.
      - name: Typecheck
        run: npm run typecheck

      # DBIN-01 (#75): madge cycle detection. The SYNC_RUN_STATUSES single
      # source of truth is imported by Drizzle / Zod / QueryCache / repo —
      # a future ESM cycle through these would resolve to `undefined` at
      # runtime, not at compile time. Type-only imports are skipped via
      # .madgerc so pre-existing intra-doctor type cycles do not gate CI.
      - name: Circular-dependency check
        run: npm run check:circular

      # Build MUST precede test — the integration test in
      # tests/integration/mcp-stdout-purity.test.ts spawns `dist/mcp.mjs` as a
      # subprocess (Pattern 5(b) caveat + Pitfall 7).
      - name: Build
        run: npm run build

      - name: Test
        # D-25: on ubuntu-latest, force the file-fallback path so the
        # keyring (absent on most Linux runners without libsecret) is
        # skipped. macOS leaves the env unset so the keyring code path is
        # exercised end-to-end. The token-store reads
        # RECOVERY_LEDGER_FORCE_FILE_STORE at module load.
        env:
          RECOVERY_LEDGER_FORCE_FILE_STORE: ${{ matrix.os == 'ubuntu-latest' && '1' || '' }}
        run: npm run test

      # Single entrypoint for all three D-04 / D-09 grep gates (tone words +
      # emoji, console.* outside src/cli/**, process.stdout.write outside
      # src/cli/commands/doctor.ts). Lives in scripts/ so developers can run
      # the same gates locally.
      - name: Grep gates
        run: bash scripts/ci-grep-gates.sh
